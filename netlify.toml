# Go Lucky Partners — partners.golucky.co.za
# Static site (no build step). Publishes the repo root.
#
# This repo is the single source of truth for the partners site (consolidated
# 2026-06-03). Pushing to `main` deploys to production via Netlify's GitHub
# integration. The forced 404 rules below ensure development/source artifacts
# (.sql schema files, the supabase/ dir) can never be served, even though they
# live in the repo for version control.

[build]
  publish = "."

# apply.html was the standard no-pricing account form (added 2026-06-03). Since
# 2026-07-22 index.html is itself pricing-free, so the two converged and apply.html
# was retired to avoid a repeat of the three-divergent-copies incident. The file is
# kept in the repo for history; this 301 sends all traffic to the live form.
[[redirects]]
  from = "/apply.html"
  to = "/"
  status = 301
  force = true

# Block source/dev artifacts from being web-served.
[[redirects]]
  from = "/*.sql"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/supabase/*"
  to = "/index.html"
  status = 404
  force = true
